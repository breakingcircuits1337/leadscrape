<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chop Shop — Coming Soon</title>
  <meta name="description" content="AI Chop Shop — Build, mod, and tune your AI like a custom ride. Shops opening soon. Sign up to be first in line."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/style.css">
</head>
<body>
  <div id="landing">
    <div class="bg">
      <div class="stripe s1"></div>
      <div class="stripe s2"></div>
      <div class="stripe s3"></div>
      <div class="grain"></div>
    </div>

    <header class="site-header">
      <div class="logo">
        <span class="logo-top">AI</span>
        <span class="logo-bottom">CHOP SHOP</span>
      </div>
      <div class="badge">V</div>
    </header>

    <main class="hero">
      <div class="hero-content">
        <h1 class="title">Shops opening soon</h1>
        <p class="tagline">Build, mod, and tune your AI like a custom ride. Inspired by the streets, powered by intelligence.</p>

        <form id="signup-form" class="signup">
          <div class="input-wrap">
            <input id="email-input" type="email" name="email" placeholder="Enter your email" autocomplete="email" required/>
            <button id="signup-button" type="submit" class="cta">Enter the Chop Shop</button>
          </div>
          <p id="signup-message" class="signup-message" aria-live="polite"></p>
          <p class="privacy">We’ll only email you about the launch. No spam, ever.</p>
        </form>
      </div>
    </main>

    <footer class="site-footer">
      <p>© <span id="year"></span> AI Chop Shop. Not affiliated with Rockstar Games or GTA V.</p>
    </footer>
  </div>

  <script src="scripts/script.js"></script>
</body>
</html>
