<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Mainframe — Real-time Cyber Intelligence</title>
  <link rel="stylesheet" href="styles/mainframe.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app" class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">MF</div>
        <div class="brand-meta">
          <h1>The Mainframe</h1>
          <span class="tagline">Real-time cyber intelligence. Signal without the noise.</span>
        </div>
      </div>
      <div class="controls">
        <div class="control">
          <label>Sources</label>
          <select id="filter-source" multiple>
            <option value="all" selected>All</option>
            <option value="CISA">CISA</option>
            <option value="NVD">NVD</option>
            <option value="Mandiant">Mandiant</option>
            <option value="Microsoft Security">Microsoft Security</option>
            <option value="The Hacker News">The Hacker News</option>
            <option value="arXiv">arXiv</option>
          </select>
        </div>
        <div class="control">
          <label>Severity</label>
          <select id="filter-severity">
            <option value="any" selected>Any</option>
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="elevated">Elevated</option>
            <option value="info">Info</option>
          </select>
        </div>
        <div class="control">
          <label>Sort</label>
          <select id="sort-order">
            <option value="latest" selected>Latest</option>
            <option value="priority">Highest Priority</option>
          </select>
        </div>
        <div class="control search">
          <input id="search" type="search" placeholder="Search headlines and blurbs">
        </div>
      </div>
    </header>

    <main class="content">
      <aside class="sidebar">
        <div class="panel">
          <div class="panel-title">Quick Filters</div>
          <button class="chip" data-chip="kev">KEV only</button>
          <button class="chip" data-chip="cve-today">CVEs today</button>
          <button class="chip" data-chip="ransomware">Ransomware</button>
          <button class="chip" data-chip="cloud">Cloud</button>
        </div>
        <div class="panel">
          <div class="panel-title">Status</div>
          <div class="stat"><span id="stat-total">0</span> items</div>
          <div class="stat"><span id="stat-new">0</span> new</div>
        </div>
      </aside>

      <section class="grid-wrap">
        <div id="new-indicator" class="new-indicator hidden">New items</div>
        <div id="grid" class="grid"></div>
      </section>
    </main>
  </div>

  <div id="glitch-layer" aria-hidden="true"></div>

  <script src="scripts/mainframe.js"></script>
</body>
</html>
